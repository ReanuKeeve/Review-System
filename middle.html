<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toddler Group</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page">
      <a href="index.html" class="back-link">← Back</a>

      <header class="page-header">
        <h1>Middle & Big groups</h1>
      </header>

      <section class="card-container">
        <article class="card">
          <div class="image-frame">
            <img src="assets/images/head.webp" alt="Head" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Head</h2>
            <button class="play-btn" onclick="playSound('audio1')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
          <div class="image-frame">
            <img src="assets/images/knee.webp" alt="Knee" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Knee</h2>
            <button class="play-btn" onclick="playSound('audio2')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
            <div class="image-frame">
                <img src="assets/images/toe.webp" alt="Toe" />
            </div>
            <div class="card-body">
                <h2 class="card-title">Toe</h2>
                <button class="play-btn" onclick="playSound('audio3')">
                    ▶ Play Audio
                </button>
            </div>
        </article>

        <article  class="card">
            <div class="image-frame">
                <img src="assets/images/tooth.webp" alt="Tooth" />
            </div>
            <div class="card-body">
                <h2 class="card-title">Tooth</h2>
                <button class="play-btn" onclick="playSound('audio4')">
                    ▶ Play Audio
                </button>
            </div>
        </article>

        <article class="card">
          <div class="image-frame">
            <img src="assets/images/tummy.webp" alt="Tummy" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Tummy</h2>
            <button class="play-btn" onclick="playSound('audio5')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
            <div class="image-frame">
                <img src="assets/images/hand.webp" alt="Hand" />
            </div>
            <div class="card-body">
                <h2 class="card-title">Hand</h2>
                <button class="play-btn" onclick="playSound('audio6')">
                    ▶ Play Audio
                </button>
            </div>
        </article>

      </section>
    </main>

    <audio id="audio1" src="assets/audio/head.mp3"></audio>
    <audio id="audio2" src="assets/audio/knee.mp3"></audio>
    <audio id="audio3" src="assets/audio/toe.mp3"></audio>
    <audio id="audio4" src="assets/audio/tooth.mp3"></audio>
    <audio id="audio5" src="assets/audio/tummy.mp3"></audio>
    <audio id="audio6" src="assets/audio/hand.mp3"></audio>

    <script src="js/index.js"></script>
  </body>
</html>

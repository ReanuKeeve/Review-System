<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toddler Group</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main class="page">
      <a href="index.html" class="back-link">← Back</a>

      <header class="page-header">
        <h1>Toddler Group</h1>
        <p class="group-subtitle">Tap a card to hear the word</p>
      </header>

      <section class="card-container">
        <article class="card">
          <div class="image-frame">
            <img src="assets/images/happy.png" alt="Happy bear" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Happy</h2>
            <button class="play-btn" onclick="playSound('audio1')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
          <div class="image-frame">
            <img src="assets/images/sad.png" alt="Sad bear" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Sad</h2>
            <button class="play-btn" onclick="playSound('audio2')">
              ▶ Play Audio
            </button>
          </div>
        </article>
      </section>
    </main>

    <audio id="audio1" src="assets/audio/happy.mp3"></audio>
    <audio id="audio2" src="assets/audio/sad.mp3"></audio>

    <script src="js/index.js"></script>
  </body>
</html>

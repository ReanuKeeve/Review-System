<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toddler Group</title>
    <link rel="stylesheet" href="css/main.css" />
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "f8b92809d3f247148b5bb4eb91309f70"}'></script><!-- End Cloudflare Web Analytics -->
  </head>
  <body>
    <main class="page">
      <a href="index.html" class="back-link">← Back</a>

      <header class="page-header">
        <h1>Toddler Group</h1>
      </header>

      <section class="card-container">
        <article class="card">
          <div class="image-frame">
            <img src="assets/images/happy.webp" alt="Happy bear" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Happy</h2>
            <button class="play-btn" onclick="playSound('audio1')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
          <div class="image-frame">
            <img src="assets/images/sad.webp" alt="Sad bear" />
          </div>
          <div class="card-body">
            <h2 class="card-title">Sad</h2>
            <button class="play-btn" onclick="playSound('audio2')">
              ▶ Play Audio
            </button>
          </div>
        </article>

        <article class="card">
            <div class="card-body">
                <h2 class="card-title">Hello!</h2>
                <button class="play-btn" onclick="playSound('audio3')">
                    ▶ Play Audio
                </button>
            </div>
        </article>

        <article class="card">
            <div class="card-body">
                <h2 class="card-title">Goodbye!</h2>
                <button class="play-btn" onclick="playSound('audio4')">
                    ▶ Play Audio
                </button>
            </div>
        </article>

      </section>
    </main>

    <audio id="audio1" src="assets/audio/happy.mp3" preload="auto"></audio>
    <audio id="audio2" src="assets/audio/sad.mp3" preload="auto"></audio>
    <audio id="audio3" src="assets/audio/hello.mp3" preload="auto"></audio>
    <audio id="audio4" src="assets/audio/goodbye.mp3" preload="auto"></audio>

    <script src="js/index.js"></script>
  </body>
</html>
